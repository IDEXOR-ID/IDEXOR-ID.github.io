<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEXOR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            background: #000;
            overflow: hidden;
        }

        /* ── poster background ── */
        .poster {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        .poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .poster::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(
                    105deg,
                    rgba(0,0,0,0.05) 0%,
                    rgba(0,0,0,0.00) 35%,
                    rgba(0,0,0,0.25) 65%,
                    rgba(0,0,0,0.60) 100%
                );
        }

        /* ── right-column content ── */
        .content {
            position: fixed;
            z-index: 2;
            right: 28px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 18px;
            max-width: 185px;
        }

        .brand-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
        }

        .logo {
            width: 6px;
            height: 6px;
            border-radius: 1.5px;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 0 8px rgba(255,255,255,0.3);
        }

        .brand-name {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.11em;
            color: rgba(255,255,255,0.55);
            text-transform: uppercase;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 7px;
            width: 100%;
        }

        .link {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 16px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 12.5px;
            font-weight: 600;
            letter-spacing: -0.01em;
            white-space: nowrap;
            transition: all 0.2s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .link:active { transform: scale(0.96); }

        /* CTA — filled white */
        .link-cta {
            background: rgba(255,255,255,0.95);
            color: #0a0a0b;
            font-weight: 700;
        }
        .link-cta:hover { background: #fff; }

        /* secondary — ghost */
        .link-ghost {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.18);
            color: rgba(255,255,255,0.9);
        }
        .link-ghost:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.35);
        }

        .link svg {
            flex-shrink: 0;
            width: 14px;
            height: 14px;
            opacity: 0.7;
        }
        .link-cta svg { opacity: 0.85; }

        /* ── bottom tagline ── */
        .tagline {
            position: fixed;
            bottom: 28px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 2;
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.28);
        }

        /* ── responsive ── */
        @media (min-height: 750px) {
            .content { gap: 22px; }
            .link { padding: 14px 18px; font-size: 13.5px; border-radius: 11px; }
            .links { gap: 8px; }
        }

        @media (max-height: 640px) {
            .content { gap: 12px; right: 18px; max-width: 160px; }
            .link { padding: 10px 12px; font-size: 11.5px; border-radius: 8px; }
            .links { gap: 5px; }
            .brand-name { font-size: 10px; }
            .tagline { bottom: 16px; font-size: 8px; }
        }

    </style>
</head>
<body>

    <div class="poster">
        <img src="bg.jpg" alt="">
    </div>

    <div class="content">
        <div class="brand-row">
            <div class="logo"></div>
            <span class="brand-name">IDEXOR</span>
        </div>

        <div class="links">
            <a href="https://t.me/idexor" class="link link-cta">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.5 3.5L2.5 10.5L10.5 14.5L14.5 22.5L21.5 3.5Z"/>
                    <line x1="10.5" y1="14.5" x2="14.5" y2="9.5"/>
                </svg>
                Telegram
            </a>

            <a href="https://wa.me/85296717301" class="link link-ghost">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                    <line x1="9" y1="9" x2="9.01" y2="9"/>
                    <line x1="15" y1="9" x2="15.01" y2="9"/>
                </svg>
                WhatsApp
            </a>

            <a href="https://fyids.com/?ref=5858" class="link link-ghost">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <line x1="3" y1="9" x2="21" y2="9"/>
                    <line x1="9" y1="21" x2="9" y2="9"/>
                </svg>
                Store
            </a>
        </div>
    </div>

    <p class="tagline">Tap to connect</p>

</body>
</html>
