<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEXOR · Contact</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                180deg,
                rgba(0,0,0,0.55) 0%,
                rgba(0,0,0,0.65) 40%,
                rgba(0,0,0,0.78) 100%
            );
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            padding: 24px;
        }

        .card {
            background: rgba(18,18,20,0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 40px 32px 32px;
            text-align: center;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #fff;
            margin-bottom: 6px;
        }

        .subtitle {
            color: rgba(255,255,255,0.45);
            font-size: 13px;
            font-weight: 400;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: #fff;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 14px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: -0.01em;
            transition: all 0.2s ease;
        }

        .link:hover {
            background: rgba(255,255,255,0.10);
            border-color: rgba(255,255,255,0.16);
        }

        .link-label {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .link-icon {
            width: 18px;
            height: 18px;
            opacity: 0.5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .link-arrow {
            opacity: 0.3;
            font-size: 12px;
            transition: opacity 0.2s;
        }

        .link:hover .link-arrow {
            opacity: 0.7;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 0.04em;
        }
    </style>
</head>
<body>
    <div class="bg">
        <img src="bg.jpg" alt="">
    </div>

    <div class="container">
        <div class="card">
            <h1>Contact Us</h1>
            <p class="subtitle">Choose your preferred way to reach us</p>

            <div class="links">
                <a href="https://t.me/idexor" class="link">
                    <span class="link-label">
                        <span class="link-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 3.5L2.5 10.5L10.5 14.5L14.5 22.5L21.5 3.5Z"/><line x1="10.5" y1="14.5" x2="14.5" y2="9.5"/></svg>
                        </span>
                        Telegram
                    </span>
                    <span class="link-arrow">→</span>
                </a>

                <a href="https://wa.me/85296717301" class="link">
                    <span class="link-label">
                        <span class="link-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
                        </span>
                        WhatsApp
                    </span>
                    <span class="link-arrow">→</span>
                </a>

                <a href="https://fyids.com/?ref=5858" class="link">
                    <span class="link-label">
                        <span class="link-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                        </span>
                        Back to Store
                    </span>
                    <span class="link-arrow">→</span>
                </a>
            </div>
        </div>

        <p class="footer">IDEXOR &copy; 2026</p>
    </div>
</body>
</html>
