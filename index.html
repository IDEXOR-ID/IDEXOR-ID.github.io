<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEXOR — Contact</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            background: #000;
        }

        /* ── full-bleed image ── */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        .bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* barely-there gradient — preserves image clarity */
        .bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(160deg,
                    rgba(0,0,0,0.12) 0%,
                    rgba(0,0,0,0.00) 40%,
                    rgba(0,0,0,0.35) 80%,
                    rgba(0,0,0,0.70) 100%
                );
        }

        /* ── right-side content column ── */
        .panel {
            position: fixed;
            right: max(16px, env(safe-area-inset-right, 16px));
            bottom: 50%;
            transform: translateY(50%);
            z-index: 2;
            width: min(180px, 36vw);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 20px;
        }

        /* brand */
        .brand {
            text-align: right;
            margin-bottom: 4px;
        }
        .brand-mark {
            display: inline-block;
            width: 26px;
            height: 26px;
            background: rgba(255,255,255,0.95);
            border-radius: 6px;
            font-weight: 700;
            font-size: 13px;
            color: #000;
            line-height: 26px;
            text-align: center;
            margin-bottom: 8px;
        }
        .brand-name {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.10em;
            color: rgba(255,255,255,0.65);
            text-transform: uppercase;
        }

        /* buttons */
        .btns {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 13px 14px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -0.01em;
            text-align: center;
            transition: all 0.22s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            white-space: nowrap;
        }

        .btn-solid {
            background: #fff;
            color: #0a0a0b;
        }
        .btn-solid:active { background: #e6e6e6; transform: scale(0.96); }

        .btn-outline {
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.25);
        }
        .btn-outline:active { background: rgba(255,255,255,0.08); transform: scale(0.96); }

        .btn svg {
            flex-shrink: 0;
            width: 15px;
            height: 15px;
        }

        /* ── bottom hint ── */
        .hint {
            position: fixed;
            bottom: max(20px, env(safe-area-inset-bottom, 20px));
            left: 0;
            right: 0;
            text-align: center;
            z-index: 2;
            font-size: 9px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.30);
        }

        /* ── taller screens tweak ── */
        @media (min-height: 780px) {
            .btn { padding: 15px 16px; font-size: 14px; border-radius: 13px; }
            .btns { gap: 9px; }
            .brand-name { font-size: 12px; }
        }

        @media (max-height: 600px) {
            .btn { padding: 10px 12px; font-size: 12px; border-radius: 10px; }
            .btns { gap: 6px; }
            .panel { gap: 12px; }
            .brand-mark { width: 22px; height: 22px; font-size: 11px; line-height: 22px; }
        }

    </style>
</head>
<body>

    <div class="bg">
        <img src="bg.jpg" alt="">
    </div>

    <div class="panel">
        <div class="brand">
            <div class="brand-mark">I</div>
            <div class="brand-name">IDEXOR</div>
        </div>

        <div class="btns">
            <a href="https://t.me/idexor" class="btn btn-solid">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.5 3.5L2.5 10.5L10.5 14.5L14.5 22.5L21.5 3.5Z"/>
                    <line x1="10.5" y1="14.5" x2="14.5" y2="9.5"/>
                </svg>
                Telegram
            </a>
            <a href="https://wa.me/85296717301" class="btn btn-outline">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                    <line x1="9" y1="9" x2="9.01" y2="9"/>
                    <line x1="15" y1="9" x2="15.01" y2="9"/>
                </svg>
                WhatsApp
            </a>
            <a href="https://fyids.com/?ref=5858" class="btn btn-outline">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/>
                </svg>
                Store
            </a>
        </div>
    </div>

    <p class="hint">Tap to connect</p>

</body>
</html>
